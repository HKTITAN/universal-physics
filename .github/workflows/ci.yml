name: validate

# Integrity gate for the wiki, the book manifest, and the website build.
# Runs on every push and pull request so outside contributions are validated
# before merge. (The Paged.js/Chrome book PDF render is intentionally not run
# here — it needs system Chrome; the manifest check is the book-side gate.)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check internal links
        run: node scripts/check-links.mjs

      - name: Validate book manifest (contiguous chapters, sources exist)
        run: node scripts/check-book-manifest.mjs

      - name: Install site deps
        working-directory: site
        run: npm ci

      - name: Build site (typecheck + static export)
        working-directory: site
        run: npm run build
