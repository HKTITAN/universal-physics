name: validate

# Integrity gate for the wiki, the manifests, the citations, the book, and the
# website build. Runs on every push and pull request so outside contributions
# are validated before merge. (Only the Paged.js/Chrome PDF render is skipped —
# it needs system Chrome; the stage-1 HTML build below is the book-side gate and
# exercises the cross-reference + fail-loud-source guards.)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check internal links
        run: node scripts/check-links.mjs

      - name: Validate book manifest (contiguous chapters, sources exist)
        run: node scripts/check-book-manifest.mjs

      - name: Check manifest drift (vault <-> site <-> book)
        run: node scripts/check-manifests.mjs

      - name: Check citation well-formedness (arXiv IDs / DOIs)
        run: node scripts/check-citations.mjs

      - name: Install book deps
        working-directory: book
        run: npm ci

      - name: Book stage-1 build (HTML assembly + cross-reference + fail-loud sources)
        run: node book/build.js

      - name: Install site deps
        working-directory: site
        run: npm ci

      - name: Build site (typecheck + static export)
        working-directory: site
        run: npm run build
